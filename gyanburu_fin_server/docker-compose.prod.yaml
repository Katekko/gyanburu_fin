services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: gyanburu_fin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - gyanburu_fin_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:6.2.6
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      runmode: production
      serverid: default
      logging: normal
      role: monolith
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
    volumes:
      - ./config/passwords.yaml:/config/passwords.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  gyanburu_fin_data:
