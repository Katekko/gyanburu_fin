# Production config for self-hosted deployment over Tailscale / LAN.
# Clients reach the server at http://192.168.0.229:<port>.

apiServer:
  port: 8080
  publicHost: 192.168.0.229
  publicPort: 8080
  publicScheme: http

insightsServer:
  port: 8081
  publicHost: 192.168.0.229
  publicPort: 8081
  publicScheme: http

webServer:
  port: 8082
  publicHost: 192.168.0.229
  publicPort: 8082
  publicScheme: http

database:
  host: postgres
  port: 5432
  name: gyanburu_fin
  user: postgres
  requireSsl: false

redis:
  enabled: true
  host: redis
  port: 6379

maxRequestSize: 524288

sessionLogs:
  consoleEnabled: false
