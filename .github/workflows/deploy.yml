name: Deploy server

on:
  push:
    branches: [main]
    paths:
      - 'gyanburu_fin_server/**'
      - 'gyanburu_fin_flutter/**'
      - 'gyanburu_fin_client/**'
      - 'pubspec.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/katekko/gyanburu_fin_server

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.8'
          channel: stable
          cache: true

      - name: Build Flutter web
        working-directory: gyanburu_fin_flutter
        run: |
          flutter pub get
          flutter build web \
            --base-href /app/ \
            --wasm \
            --dart-define=SERVER_URL=http://192.168.0.229:8080/ \
            --dart-define=APP_VERSION=${GITHUB_SHA::7} \
            --output ../gyanburu_fin_server/web/app

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: gyanburu_fin_server
          file: gyanburu_fin_server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Join Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          args: --accept-routes

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -o BatchMode=yes "$USER@$HOST" bash <<'REMOTE'
            set -euo pipefail
            cd /opt/gyanburu_fin
            git fetch --quiet origin main
            git reset --hard origin/main
            cd gyanburu_fin_server
            docker compose -f docker-compose.prod.yaml pull server
            docker compose -f docker-compose.prod.yaml run --rm -T \
              --entrypoint sh server \
              -c './server --mode=production --apply-migrations --role=maintenance' \
              < /dev/null
            docker compose -f docker-compose.prod.yaml rm -fsv server
            docker compose -f docker-compose.prod.yaml up -d server
            docker image prune -f
          REMOTE
